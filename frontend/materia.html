<!DOCTYPE html>
<html lang="pt-BR">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>EnemFlow - Disciplina</title>
  <link rel="stylesheet" href="style.css">
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    body {
      font-family: 'Plus Jakarta Sans', sans-serif;
    }
    
    .subject-hero {
      padding: 3rem 2.5rem;
      border-radius: 24px;
      margin-bottom: 2.5rem;
      position: relative;
      overflow: hidden;
      border: 1px solid rgba(255, 255, 255, 0.08);
      box-shadow: 0 15px 40px rgba(0, 0, 0, 0.4);
    }
    
    .subject-hero-glow {
      position: absolute;
      top: -40%;
      right: -20%;
      width: 300px;
      height: 300px;
      background: rgba(255, 255, 255, 0.05);
      filter: blur(50px);
      border-radius: 50%;
      pointer-events: none;
    }
    
    .btn-back {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      background: rgba(255, 255, 255, 0.04);
      border: 1px solid rgba(255, 255, 255, 0.08);
      color: #a1a1aa;
      padding: 8px 16px;
      border-radius: 10px;
      font-size: 0.85rem;
      font-weight: 600;
      cursor: pointer;
      margin-bottom: 1.5rem;
      transition: all 0.25s ease;
      text-decoration: none;
    }
    
    .btn-back:hover {
      background: rgba(255, 255, 255, 0.08);
      color: #ffffff;
      transform: translateX(-3px);
    }
    
    .topics-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
      gap: 1.5rem;
      margin-top: 1.5rem;
    }
    
    .topic-card {
      background: var(--bg-panel);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 2rem 1.75rem;
      cursor: pointer;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      min-height: 160px;
      position: relative;
      overflow: hidden;
      transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
    }
    
    .topic-card::before {
      content: '';
      position: absolute;
      top: 0; left: 0; right: 0; height: 4px;
      background: linear-gradient(90deg, var(--primary), var(--secondary));
      opacity: 0;
      transition: opacity 0.3s ease;
    }
    
    .topic-card:hover {
      transform: translateY(-5px);
      border-color: var(--primary);
      box-shadow: 0 12px 30px rgba(0, 0, 0, 0.3), 0 0 15px rgba(99, 102, 241, 0.15);
    }
    
    .topic-card:hover::before {
      opacity: 1;
    }
    
    .topic-card:hover svg {
      transform: translateX(4px);
    }
    
    .cards-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(310px, 1fr));
      gap: 1.5rem;
      margin-bottom: 1.5rem;
    }
    
    .lesson-card {
      background: rgba(255, 255, 255, 0.02);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 1.75rem;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      min-height: 200px;
      transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
    }
    
    .lesson-card:hover {
      transform: translateY(-4px);
      border-color: rgba(99, 102, 241, 0.25);
      box-shadow: 0 10px 25px rgba(0,0,0,0.2);
    }
    
    .resource-btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      padding: 10px 14px;
      border-radius: 10px;
      font-size: 0.85rem;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.25s ease;
      width: 100%;
      text-decoration: none;
      font-family: 'Inter', sans-serif;
    }
    
    .pdf-btn {
      background: rgba(99, 102, 241, 0.08);
      border: 1px solid rgba(99, 102, 241, 0.25);
      color: #818cf8;
    }
    .pdf-btn:hover {
      background: var(--primary);
      color: white;
      border-color: var(--primary);
      box-shadow: 0 4px 12px rgba(99, 102, 241, 0.3);
    }
    
    .video-btn {
      background: rgba(236, 72, 153, 0.08);
      border: 1px solid rgba(236, 72, 153, 0.25);
      color: #f472b6;
    }
    .video-btn:hover:not(:disabled) {
      background: var(--secondary);
      color: white;
      border-color: var(--secondary);
      box-shadow: 0 4px 12px rgba(236, 72, 153, 0.3);
    }
    
    .video-btn.placeholder-btn {
      background: rgba(255, 255, 255, 0.02);
      border: 1px dashed rgba(255, 255, 255, 0.08);
      color: rgba(255, 255, 255, 0.25);
      cursor: not-allowed;
    }
  </style>
</head>

<body>
  <div class="page-enter"></div>

  <div class="app-container">
    
    <!-- Barra de Topo Mobile (Aparece apenas no celular) -->
    <div class="mobile-top-actions" style="display: none; justify-content: center;">
      <div class="sidebar-logo" style="margin: 0; padding: 0;">
        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="url(#gradMobileMateria)" stroke-width="2">
          <defs>
            <linearGradient id="gradMobileMateria" x1="0%" y1="0%" x2="100%" y2="100%">
              <stop offset="0%" style="stop-color:#6366f1;stop-opacity:1" />
              <stop offset="100%" style="stop-color:#ec4899;stop-opacity:1" />
            </linearGradient>
          </defs>
          <polygon points="13 2 3 14 12 14 11 22 21 10 12 10 13 2"></polygon>
        </svg>
      </div>
    </div>

    <!-- Sidebar -->
    <aside class="sidebar">
      <div class="sidebar-logo">
        <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="url(#grad)" stroke-width="2"
          stroke-linecap="round" stroke-linejoin="round">
          <defs>
            <linearGradient id="grad" x1="0%" y1="0%" x2="100%" y2="100%">
              <stop offset="0%" style="stop-color:#6366f1;stop-opacity:1" />
              <stop offset="100%" style="stop-color:#ec4899;stop-opacity:1" />
            </linearGradient>
          </defs>
          <polygon points="13 2 3 14 12 14 11 22 21 10 12 10 13 2"></polygon>
        </svg>
        <span class="text-gradient" style="font-family: 'Outfit'; font-weight: 800;">EnemFlow</span>
      </div>

      <nav style="flex: 1;">
        <a href="dashboard.html" class="nav-link active">
          <svg viewBox="0 0 24 24">
            <path d="m3 9 9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"></path>
            <polyline points="9 22 9 12 15 12 15 22"></polyline>
          </svg>
          Home
        </a>
        <a href="progresso.html" class="nav-link">
          <svg viewBox="0 0 24 24">
            <path d="M22 12h-4l-3 9L9 3l-3 9H2"></path>
          </svg>
          Progresso
        </a>
        <a href="anotacoes.html" class="nav-link">
          <svg viewBox="0 0 24 24">
            <path d="M12 20h9"></path>
            <path d="M16.5 3.5a2.121 2.121 0 0 1 3 3L7 19l-4 1 1-4L16.5 3.5z"></path>
          </svg>
          Anotações
        </a>
        <a href="perfil.html" class="nav-link">
          <svg viewBox="0 0 24 24"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path><circle cx="12" cy="7" r="4"></circle></svg>
          Meu Perfil
        </a>
      </nav>

      <button onclick="App.logout()" class="btn btn-danger"
        style="margin-top: auto; justify-content: flex-start; padding-left: 16px;">
        <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"></path>
          <polyline points="16 17 21 12 16 7"></polyline>
          <line x1="21" y1="12" x2="9" y2="12"></line>
        </svg>
        Sair da conta
      </button>
    </aside>

    <!-- Main Content -->
    <main class="main-content">

      <header class="topbar">
        <a href="dashboard.html" class="btn-back">
          <svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2.5">
            <line x1="19" y1="12" x2="5" y2="12"></line>
            <polyline points="12 19 5 12 12 5"></polyline>
          </svg>
          Voltar ao Dashboard
        </a>

        <div class="xp-badge">
          <svg viewBox="0 0 24 24" width="16" height="16" fill="currentColor" stroke="none">
            <polygon points="13 2 3 14 12 14 11 22 21 10 12 10 13 2"></polygon>
          </svg>
          <span id="userXP">0</span> XP
        </div>
      </header>

      <!-- Subject Hero Header -->
      <div style="margin-top: 2.5rem; margin-bottom: 3rem; display: flex; flex-direction: column; gap: 10px;">
        <span class="tag" id="lessonCountBadge" style="background: rgba(99, 102, 241, 0.1); color: var(--primary); font-size: 0.75rem; font-weight: 700; padding: 5px 12px; border-radius: 8px; text-transform: uppercase; width: fit-content; border: 1px solid rgba(99, 102, 241, 0.2);">Carregando...</span>
        <h1 id="subjectTitle" class="text-gradient" style="font-size: 3.5rem; font-weight: 800; margin: 0; letter-spacing: -0.03em; line-height: 1.1; font-family: 'Plus Jakarta Sans', 'Outfit', 'Sora', sans-serif;">Disciplina</h1>
      </div>

      <!-- Topics list container -->
      <div id="topics-container">
        <!-- Renderizado dinamicamente -->
      </div>

    </main>
  </div>

  <script src="app.js"></script>
  <script>
    if (!App.getToken()) window.location.href = 'login.html';

    const subjectName = new URLSearchParams(window.location.search).get('subject') || 'Geral';

    function getSubjectColors(subjectName) {
      const s = subjectName.toLowerCase();
      if (s.includes('mat')) return { grad: 'linear-gradient(135deg, #1e1b4b 0%, #312e81 100%)', badge: 'rgba(99, 102, 241, 0.2)', text: '#a5b4fc', border: '#4338ca' };
      if (s.includes('port') || s.includes('red') || s.includes('lin')) return { grad: 'linear-gradient(135deg, #4c0519 0%, #881337 100%)', badge: 'rgba(244, 63, 94, 0.2)', text: '#fda4af', border: '#be123c' };
      if (s.includes('art')) return { grad: 'linear-gradient(135deg, #1e1b4b 0%, #2e1065 100%)', badge: 'rgba(168, 85, 247, 0.2)', text: '#c084fc', border: '#a855f7' };
      if (s.includes('fis') || s.includes('quim') || s.includes('cie') || s.includes('bio') || s.includes('natureza')) return { grad: 'linear-gradient(135deg, #022c22 0%, #064e3b 100%)', badge: 'rgba(16, 185, 129, 0.2)', text: '#a7f3d0', border: '#047857' };
      if (s.includes('hist') || s.includes('geog') || s.includes('hum') || s.includes('filo') || s.includes('socio')) return { grad: 'linear-gradient(135deg, #451a03 0%, #78350f 100%)', badge: 'rgba(245, 158, 11, 0.2)', text: '#fde68a', border: '#b45309' };
      // Default: premium violet brand gradient
      return { grad: 'linear-gradient(135deg, #1e1b4b 0%, #2e1065 100%)', badge: 'rgba(168, 85, 247, 0.2)', text: '#c084fc', border: '#a855f7' };
    }

    async function loadProfile() {
      try {
        const user = await App.api('/auth/me');
        document.getElementById('userXP').innerText = user.xp;
      } catch (err) {
        if (err.message.includes('Sessão') || err.message.includes('Token')) App.logout();
      }
    }

    async function loadSubjectContents() {
      try {
        const container = document.getElementById('topics-container');
        container.innerHTML = '<p class="text-muted">Organizando tópicos com inteligência...</p>';

        // Aplica cores do Hero dinamicamente
        const colors = getSubjectColors(subjectName);
        const title = document.getElementById('subjectTitle');
        title.innerText = subjectName;

        const contents = await App.api('/contents');
        
        // Filtra conteúdos desta matéria
        const filtered = contents.filter(c => (c.materia || 'Geral').toLowerCase() === subjectName.toLowerCase());

        document.getElementById('lessonCountBadge').innerText = filtered.length + (filtered.length === 1 ? ' Aula Disponível' : ' Aulas Disponíveis');

        if (filtered.length === 0) {
          container.innerHTML = '<p class="text-muted">Nenhuma aula disponível para esta disciplina.</p>';
          return;
        }

        // Agrupa por Assunto e conta aulas
        const topics = {};
        filtered.forEach(c => {
          const a = c.assunto || 'Geral';
          if (!topics[a]) topics[a] = 0;
          topics[a]++;
        });

        let html = '<div class="topics-grid">';
        for (const topicName in topics) {
          const count = topics[topicName];
          html += `
            <div class="topic-card" onclick="window.location.href='topico.html?subject=${encodeURIComponent(subjectName)}&topic=${encodeURIComponent(topicName)}'">
              <div>
                <span class="tag" style="background: rgba(99, 102, 241, 0.08); color: var(--primary); border: 1px solid rgba(99, 102, 241, 0.2); font-size: 0.7rem; font-weight: 700; padding: 4px 10px; border-radius: 6px; text-transform: uppercase;">
                  ${count} ${count === 1 ? 'Aula' : 'Aulas'}
                </span>
                <h3 style="font-size: 1.35rem; font-weight: 700; color: var(--text); margin-top: 12px; margin-bottom: 0; line-height: 1.3;">
                  ${topicName}
                </h3>
              </div>
              
              <div style="display: flex; align-items: center; gap: 6px; margin-top: 1.5rem; color: var(--primary); font-size: 0.85rem; font-weight: 600;">
                <span>Ver Aulas</span>
                <svg viewBox="0 0 24 24" width="14" height="14" fill="none" stroke="currentColor" stroke-width="3" style="transition: transform 0.2s ease;">
                  <line x1="5" y1="12" x2="19" y2="12"></line>
                  <polyline points="12 5 19 12 12 19"></polyline>
                </svg>
              </div>
            </div>
          `;
        }
        html += '</div>';

        container.innerHTML = html;

      } catch (err) {
        App.showToast('Erro ao carregar tópicos da disciplina: ' + err.message, true);
      }
    }

    function openStudy(id) {
      localStorage.setItem('currentContentId', id);
      window.location.href = 'study.html';
    }

    loadProfile();
    loadSubjectContents();
  </script>
</body>

</html>
