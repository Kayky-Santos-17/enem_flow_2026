<!DOCTYPE html>
<html lang="pt-BR">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>EnemFlow - Disciplina</title>
  <link rel="stylesheet" href="style.css">
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    body {
      font-family: 'Plus Jakarta Sans', sans-serif;
    }
    
    .subject-hero {
      padding: 3rem 2.5rem;
      border-radius: 24px;
      margin-bottom: 2.5rem;
      position: relative;
      overflow: hidden;
      border: 1px solid rgba(255, 255, 255, 0.08);
      box-shadow: 0 15px 40px rgba(0, 0, 0, 0.4);
    }
    
    .subject-hero-glow {
      position: absolute;
      top: -40%;
      right: -20%;
      width: 300px;
      height: 300px;
      background: rgba(255, 255, 255, 0.05);
      filter: blur(50px);
      border-radius: 50%;
      pointer-events: none;
    }
    
    .btn-back {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      background: rgba(255, 255, 255, 0.04);
      border: 1px solid rgba(255, 255, 255, 0.08);
      color: #a1a1aa;
      padding: 8px 16px;
      border-radius: 10px;
      font-size: 0.85rem;
      font-weight: 600;
      cursor: pointer;
      margin-bottom: 1.5rem;
      transition: all 0.25s ease;
      text-decoration: none;
    }
    
    .btn-back:hover {
      background: rgba(255, 255, 255, 0.08);
      color: #ffffff;
      transform: translateX(-3px);
    }
    
    .topic-section {
      background: var(--dashboard-bg1);
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 2.5rem;
      margin-bottom: 2.5rem;
      box-shadow: 0 10px 30px rgba(0,0,0,0.15);
    }
    
    .subtopic-title {
      font-size: 1.05rem;
      color: var(--primary);
      margin-top: 1.5rem;
      margin-bottom: 1rem;
      font-weight: 600;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    
    .cards-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
      gap: 1.25rem;
      margin-bottom: 1.5rem;
    }
    
    .lesson-card {
      background: var(--dashboard-bg3);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 1.5rem;
      cursor: pointer;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      min-height: 160px;
      transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
    }
    
    .lesson-card:hover {
      transform: translateY(-4px);
      border-color: rgba(99, 102, 241, 0.3);
      box-shadow: 0 10px 25px rgba(0,0,0,0.2), 0 0 15px rgba(99, 102, 241, 0.1);
    }
    
    .lesson-card:hover .lesson-arrow {
      transform: translateX(4px);
    }
  </style>
</head>

<body>
  <div class="page-enter"></div>

  <div class="app-container">
    
    <!-- Barra de Topo Mobile (Aparece apenas no celular) -->
    <div class="mobile-top-actions" style="display: none; justify-content: center;">
      <div class="sidebar-logo" style="margin: 0; padding: 0;">
        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="url(#gradMobileMateria)" stroke-width="2">
          <defs>
            <linearGradient id="gradMobileMateria" x1="0%" y1="0%" x2="100%" y2="100%">
              <stop offset="0%" style="stop-color:#6366f1;stop-opacity:1" />
              <stop offset="100%" style="stop-color:#ec4899;stop-opacity:1" />
            </linearGradient>
          </defs>
          <polygon points="13 2 3 14 12 14 11 22 21 10 12 10 13 2"></polygon>
        </svg>
      </div>
    </div>

    <!-- Sidebar -->
    <aside class="sidebar">
      <div class="sidebar-logo">
        <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="url(#grad)" stroke-width="2"
          stroke-linecap="round" stroke-linejoin="round">
          <defs>
            <linearGradient id="grad" x1="0%" y1="0%" x2="100%" y2="100%">
              <stop offset="0%" style="stop-color:#6366f1;stop-opacity:1" />
              <stop offset="100%" style="stop-color:#ec4899;stop-opacity:1" />
            </linearGradient>
          </defs>
          <polygon points="13 2 3 14 12 14 11 22 21 10 12 10 13 2"></polygon>
        </svg>
        <span class="text-gradient" style="font-family: 'Outfit'; font-weight: 800;">EnemFlow</span>
      </div>

      <nav style="flex: 1;">
        <a href="dashboard.html" class="nav-link active">
          <svg viewBox="0 0 24 24">
            <path d="m3 9 9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"></path>
            <polyline points="9 22 9 12 15 12 15 22"></polyline>
          </svg>
          Home
        </a>
        <a href="progresso.html" class="nav-link">
          <svg viewBox="0 0 24 24">
            <path d="M22 12h-4l-3 9L9 3l-3 9H2"></path>
          </svg>
          Progresso
        </a>
        <a href="anotacoes.html" class="nav-link">
          <svg viewBox="0 0 24 24">
            <path d="M12 20h9"></path>
            <path d="M16.5 3.5a2.121 2.121 0 0 1 3 3L7 19l-4 1 1-4L16.5 3.5z"></path>
          </svg>
          Anotações
        </a>
        <a href="perfil.html" class="nav-link">
          <svg viewBox="0 0 24 24"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path><circle cx="12" cy="7" r="4"></circle></svg>
          Meu Perfil
        </a>
      </nav>

      <button onclick="App.logout()" class="btn btn-danger"
        style="margin-top: auto; justify-content: flex-start; padding-left: 16px;">
        <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"></path>
          <polyline points="16 17 21 12 16 7"></polyline>
          <line x1="21" y1="12" x2="9" y2="12"></line>
        </svg>
        Sair da conta
      </button>
    </aside>

    <!-- Main Content -->
    <main class="main-content">

      <header class="topbar">
        <a href="dashboard.html" class="btn-back">
          <svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2.5">
            <line x1="19" y1="12" x2="5" y2="12"></line>
            <polyline points="12 19 5 12 12 5"></polyline>
          </svg>
          Voltar ao Dashboard
        </a>

        <div class="xp-badge">
          <svg viewBox="0 0 24 24" width="16" height="16" fill="currentColor" stroke="none">
            <polygon points="13 2 3 14 12 14 11 22 21 10 12 10 13 2"></polygon>
          </svg>
          <span id="userXP">0</span> XP
        </div>
      </header>

      <!-- Subject Hero Header -->
      <div class="subject-hero" id="subjectHero">
        <div class="subject-hero-glow"></div>
        <span class="tag" style="background: rgba(255,255,255,0.08); color: #ffffff;" id="lessonCountBadge">Carregando...</span>
        <h1 style="font-size: 2.75rem; font-weight: 800; color: #ffffff; margin-top: 1rem; margin-bottom: 0.5rem; letter-spacing: -1px;" id="subjectTitle">Disciplina</h1>
        <p style="color: rgba(255,255,255,0.7); font-size: 0.95rem; line-height: 1.5; margin: 0; max-width: 480px;">Bons estudos! Esta trilha de aprendizado foi estruturada para maximizar sua absorção e foco.</p>
      </div>

      <!-- Topics list container -->
      <div id="topics-container">
        <!-- Renderizado dinamicamente -->
      </div>

    </main>
  </div>

  <script src="app.js"></script>
  <script>
    if (!App.getToken()) window.location.href = 'login.html';

    const subjectName = new URLSearchParams(window.location.search).get('subject') || 'Geral';

    function getSubjectColors(subjectName) {
      const s = subjectName.toLowerCase();
      if (s.includes('mat')) return { grad: 'linear-gradient(135deg, #1e1b4b 0%, #312e81 100%)', badge: 'rgba(99, 102, 241, 0.2)', text: '#a5b4fc', border: '#4338ca' };
      if (s.includes('port') || s.includes('red') || s.includes('lin')) return { grad: 'linear-gradient(135deg, #4c0519 0%, #881337 100%)', badge: 'rgba(244, 63, 94, 0.2)', text: '#fda4af', border: '#be123c' };
      if (s.includes('fis') || s.includes('quim') || s.includes('cie') || s.includes('bio') || s.includes('natureza')) return { grad: 'linear-gradient(135deg, #022c22 0%, #064e3b 100%)', badge: 'rgba(16, 185, 129, 0.2)', text: '#a7f3d0', border: '#047857' };
      if (s.includes('hist') || s.includes('geog') || s.includes('hum') || s.includes('filo') || s.includes('socio')) return { grad: 'linear-gradient(135deg, #451a03 0%, #78350f 100%)', badge: 'rgba(245, 158, 11, 0.2)', text: '#fde68a', border: '#b45309' };
      // Default
      return { grad: 'linear-gradient(135deg, #09090b 0%, #18181b 100%)', badge: 'rgba(255,255,255,0.06)', text: '#e4e4e7', border: '#27272a' };
    }

    async function loadProfile() {
      try {
        const user = await App.api('/auth/me');
        document.getElementById('userXP').innerText = user.xp;
      } catch (err) {
        if (err.message.includes('Sessão') || err.message.includes('Token')) App.logout();
      }
    }

    async function loadSubjectContents() {
      try {
        const container = document.getElementById('topics-container');
        container.innerHTML = '<p class="text-muted">Organizando tópicos com inteligência...</p>';

        // Aplica cores do Hero dinamicamente
        const colors = getSubjectColors(subjectName);
        const hero = document.getElementById('subjectHero');
        hero.style.background = colors.grad;
        hero.style.borderColor = colors.border;
        document.getElementById('subjectTitle').innerText = subjectName;

        const contents = await App.api('/contents');
        
        // Filtra conteúdos desta matéria
        const filtered = contents.filter(c => (c.materia || 'Geral').toLowerCase() === subjectName.toLowerCase());

        document.getElementById('lessonCountBadge').innerText = filtered.length + (filtered.length === 1 ? ' Aula Disponível' : ' Aulas Disponíveis');

        if (filtered.length === 0) {
          container.innerHTML = '<p class="text-muted">Nenhuma aula disponível para esta disciplina.</p>';
          return;
        }

        // Agrupa por Assunto -> Subassunto
        const grouped = {};
        filtered.forEach(c => {
          const a = c.assunto || 'Geral';
          const s = c.subassunto || '';

          if (!grouped[a]) grouped[a] = {};
          if (!grouped[a][s]) grouped[a][s] = [];

          grouped[a][s].push(c);
        });

        let html = '';
        for (const a in grouped) {
          html += `
            <div class="topic-section">
              <h2 style="font-size: 1.6rem; font-weight: 800; color: #ffffff; margin-top: 0; margin-bottom: 1.5rem; letter-spacing: -0.5px;">${a}</h2>
          `;

          for (const s in grouped[a]) {
            if (s !== 'Geral' && s !== '') {
              html += `
                <div class="subtopic-title">
                  <svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2.5">
                    <polyline points="9 18 15 12 9 6"></polyline>
                  </svg>
                  <span>${s}</span>
                </div>
              `;
            }

            html += `<div class="cards-grid">`;
            grouped[a][s].forEach(c => {
              html += `
                <div class="lesson-card" onclick="openStudy('${c._id}')">
                  <div>
                    <span class="tag" style="background: rgba(255,255,255,0.04); color: #a1a1aa; border: 1px solid rgba(255,255,255,0.06); font-size: 0.7rem; font-weight: 700; padding: 3px 8px; border-radius: 6px;">
                      ${c.tipo.toUpperCase()}
                    </span>
                    <h3 style="font-size: 1.15rem; font-weight: 700; color: #ffffff; margin-top: 10px; margin-bottom: 0;">${c.titulo}</h3>
                  </div>
                  
                  <div style="display: flex; justify-content: space-between; align-items: center; border-top: 1px solid var(--border); padding-top: 1rem; margin-top: 1.5rem;">
                    <span style="color: var(--primary); font-size: 0.8rem; font-weight: 700;">Iniciar Aula</span>
                    <svg class="lesson-arrow" viewBox="0 0 24 24" width="14" height="14" fill="none" stroke="var(--primary)" stroke-width="3" style="transition: transform 0.3s ease;">
                      <line x1="5" y1="12" x2="19" y2="12"></line>
                      <polyline points="12 5 19 12 12 19"></polyline>
                    </svg>
                  </div>
                </div>
              `;
            });
            html += `</div>`;
          }
          html += `</div>`;
        }

        container.innerHTML = html;

      } catch (err) {
        App.showToast('Erro ao carregar tópicos da disciplina: ' + err.message, true);
      }
    }

    function openStudy(id) {
      localStorage.setItem('currentContentId', id);
      window.location.href = 'study.html';
    }

    loadProfile();
    loadSubjectContents();
  </script>
</body>

</html>
