<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>EnemFlow - Progresso</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="page-enter"></div>
  
  <div class="app-container">
    
    <!-- Sidebar -->
    <aside class="sidebar">
      <div class="sidebar-logo">
        <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="url(#grad)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <defs>
            <linearGradient id="grad" x1="0%" y1="0%" x2="100%" y2="100%">
              <stop offset="0%" style="stop-color:#6366f1;stop-opacity:1" />
              <stop offset="100%" style="stop-color:#ec4899;stop-opacity:1" />
            </linearGradient>
          </defs>
          <polygon points="13 2 3 14 12 14 11 22 21 10 12 10 13 2"></polygon>
        </svg>
        <span class="text-gradient" style="font-family: 'Outfit'; font-weight: 800;">EnemFlow</span>
      </div>

      <nav style="flex: 1;">
        <a href="dashboard.html" class="nav-link">
          <svg viewBox="0 0 24 24"><path d="m3 9 9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"></path><polyline points="9 22 9 12 15 12 15 22"></polyline></svg>
          Home
        </a>
        <a href="progresso.html" class="nav-link active">
          <svg viewBox="0 0 24 24"><path d="M22 12h-4l-3 9L9 3l-3 9H2"></path></svg>
          Progresso
        </a>
        <a href="anotacoes.html" class="nav-link">
          <svg viewBox="0 0 24 24"><path d="M12 20h9"></path><path d="M16.5 3.5a2.121 2.121 0 0 1 3 3L7 19l-4 1 1-4L16.5 3.5z"></path></svg>
          Anotações
        </a>
      </nav>

      <button onclick="App.logout()" class="btn btn-danger" style="margin-top: auto; justify-content: flex-start; padding-left: 16px;">
        <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"></path><polyline points="16 17 21 12 16 7"></polyline><line x1="21" y1="12" x2="9" y2="12"></line></svg>
        Sair da conta
      </button>
    </aside>

    <!-- Main Content -->
    <main class="main-content">
      
      <header class="topbar">
        <div class="user-profile" style="cursor: pointer;" onclick="window.location.href='perfil.html'">
          <div class="avatar" id="avatarLetter" style="background-size: cover; background-position: center;">?</div>
          <div>
            <h2 id="userName" style="font-size: 1.4rem; line-height: 1.2;">Carregando...</h2>
            <p class="text-muted">Acompanhe sua evolução constante.</p>
          </div>
        </div>
        
        <div class="xp-badge" style="font-size: 1rem; padding: 8px 16px;">
          <svg viewBox="0 0 24 24" width="18" height="18" fill="currentColor" stroke="none"><polygon points="13 2 3 14 12 14 11 22 21 10 12 10 13 2"></polygon></svg>
          <span id="userXP">0</span> XP Acumulado
        </div>
      </header>

      <section>
        <div class="card">
          <h3 style="margin-bottom: 1.5rem; border-bottom: 1px solid var(--border); padding-bottom: 1rem;">Matérias Estudadas</h3>
          
          <div id="progresso-list" style="display: flex; flex-direction: column; gap: 1rem;">
            <!-- Preenchido via JS -->
            <p class="text-muted">Carregando seus dados vitais...</p>
          </div>
        </div>
      </section>

    </main>
  </div>

  <script src="app.js"></script>
  <script>
    if(!App.getToken()) window.location.href = 'login.html';

    async function loadProgress() {
      try {
        const user = await App.api('/auth/me');
        document.getElementById('userName').innerText = user.nome;
        const avatarDiv = document.getElementById('avatarLetter');
        if (user.avatarUrl) {
          avatarDiv.style.backgroundImage = `url(${user.avatarUrl})`;
          avatarDiv.innerText = '';
        } else {
          avatarDiv.innerText = user.nome.charAt(0).toUpperCase();
        }
        document.getElementById('userXP').innerText = user.xp;
        
        
        const listContainer = document.getElementById('progresso-list');
        
        if(!user.progresso || user.progresso.length === 0) {
          listContainer.innerHTML = '<p class="text-muted">Você ainda não completou nenhuma sessão de estudos. Volte para a Home e inicie o Foco!</p>';
          return;
        }

        // Agrupar por Matéria
        const grouped = user.progresso.reduce((acc, p) => {
          const materia = p.contentId ? p.contentId.materia : 'Diversos';
          if (!acc[materia]) acc[materia] = { items: [], totalMin: 0 };
          const min = Math.floor(p.tempoEstudado / 60);
          acc[materia].items.push(p);
          acc[materia].totalMin += min;
          return acc;
        }, {});

        listContainer.innerHTML = Object.entries(grouped).map(([materia, data]) => `
          <div class="materia-group" style="margin-bottom: 2rem; background: var(--dashboard-bg1); border: 1px solid var(--border); border-radius: 24px; padding: 1.8rem; overflow: hidden; position: relative;">
            <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 2rem; border-bottom: 1px solid var(--border); padding-bottom: 1.5rem;">
              <h3 class="text-gradient" style="font-size: 1.5rem;">${materia}</h3>
              <div style="display: flex; align-items: center; gap: 15px;">
                <div style="text-align: right;">
                    <p class="text-muted" style="font-size: 0.65rem; text-transform: uppercase; letter-spacing: 1.5px; font-weight: 700;">Foco Total</p>
                    <p style="font-size: 0.8rem; color: var(--text-muted);">nesta matéria</p>
                </div>
                <!-- Círculo Vazado com Pulsação -->
                <div class="pulse-green" style="width: 65px; height: 65px; border-radius: 50%; background: transparent; border: 3px solid #10b981; display: flex; flex-direction: column; align-items: center; justify-content: center; flex-shrink: 0; transition: all 0.3s;">
                    <span style="font-size: 1.3rem; font-weight: 900; color: #10b981; line-height: 1; text-shadow: 0 0 10px rgba(16, 185, 129, 0.5);">${data.totalMin}</span>
                    <span style="font-size: 0.55rem; color: #10b981; font-weight: 800; text-transform: uppercase;">min</span>
                </div>
              </div>
            </div>
            
            <div style="display: flex; flex-direction: column; gap: 1rem;">
              ${data.items.map(p => {
                const minutos = Math.floor(p.tempoEstudado / 60);
                const titulo = p.contentId ? p.contentId.titulo : 'Conteúdo Excluído';
                return `
                  <div style="display: flex; justify-content: space-between; align-items: center; padding: 1rem 1.2rem; background: rgba(255,255,255,0.02); border-radius: 16px; border: 1px solid rgba(255,255,255,0.05); transition: all 0.3s ease; cursor: default;" onmouseover="this.style.background='rgba(255,255,255,0.05)'; this.style.transform='translateX(8px)'" onmouseout="this.style.background='rgba(255,255,255,0.02)'; this.style.transform='translateX(0)'">
                    <div style="display: flex; align-items: center; gap: 12px;">
                        <div style="width: 8px; height: 8px; border-radius: 50%; background: var(--primary); box-shadow: 0 0 10px var(--primary);"></div>
                        <span style="font-weight: 500; font-size: 1rem; color: var(--text);">${titulo}</span>
                    </div>
                    <div style="width: 45px; height: 45px; border-radius: 50%; background: transparent; border: 1.5px solid rgba(16, 185, 129, 0.5); display: flex; flex-direction: column; align-items: center; justify-content: center; flex-shrink: 0; transition: all 0.3s;">
                        <span style="font-size: 1rem; font-weight: 800; color: #10b981; line-height: 1;">${minutos}</span>
                        <span style="font-size: 0.45rem; color: #10b981; font-weight: 800; text-transform: uppercase;">min</span>
                    </div>
                  </div>
                `;
              }).join('')}
            </div>
          </div>
        `).join('');

      } catch (err) {
        if(err.message.includes('Sessão')) App.logout();
        else App.showToast('Erro ao carregar progresso', true);
      }
    }

    loadProgress();
  </script>
</body>
</html>
