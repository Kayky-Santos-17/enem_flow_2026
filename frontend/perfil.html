<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>EnemFlow - Perfil</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="page-enter"></div>
  
  <div class="app-container">
    
    <aside class="sidebar">
      <div class="sidebar-logo">
        <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="url(#grad)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <defs>
            <linearGradient id="grad" x1="0%" y1="0%" x2="100%" y2="100%">
              <stop offset="0%" style="stop-color:#6366f1;stop-opacity:1" />
              <stop offset="100%" style="stop-color:#ec4899;stop-opacity:1" />
            </linearGradient>
          </defs>
          <polygon points="13 2 3 14 12 14 11 22 21 10 12 10 13 2"></polygon>
        </svg>
        <span class="text-gradient" style="font-family: 'Outfit'; font-weight: 800;">EnemFlow</span>
      </div>

      <nav style="flex: 1;">
        <a href="dashboard.html" class="nav-link">
          <svg viewBox="0 0 24 24"><path d="m3 9 9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"></path><polyline points="9 22 9 12 15 12 15 22"></polyline></svg>
          Home
        </a>
        <a href="progresso.html" class="nav-link">
          <svg viewBox="0 0 24 24"><path d="M22 12h-4l-3 9L9 3l-3 9H2"></path></svg>
          Progresso
        </a>
        <a href="anotacoes.html" class="nav-link">
          <svg viewBox="0 0 24 24"><path d="M12 20h9"></path><path d="M16.5 3.5a2.121 2.121 0 0 1 3 3L7 19l-4 1 1-4L16.5 3.5z"></path></svg>
          Anotações
        </a>
        <a href="perfil.html" class="nav-link active">
          <svg viewBox="0 0 24 24"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path><circle cx="12" cy="7" r="4"></circle></svg>
          Meu Perfil
        </a>
      </nav>

      <button onclick="App.logout()" class="btn btn-danger" style="margin-top: auto; justify-content: flex-start; padding-left: 16px;">
        <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"></path><polyline points="16 17 21 12 16 7"></polyline><line x1="21" y1="12" x2="9" y2="12"></line></svg>
        Sair da conta
      </button>
    </aside>

    <main class="main-content">
      
      <header class="topbar">
        <div class="user-profile" style="cursor: pointer;" onclick="window.location.href='perfil.html'">
          <div class="avatar" id="avatarLetter" style="background-size: cover; background-position: center;">?</div>
          <div>
            <h2 id="userNameTop" style="font-size: 1.4rem; line-height: 1.2;">Carregando...</h2>
            <p class="text-muted">Personalize sua identidade.</p>
          </div>
        </div>
      </header>

      <section class="grid" style="grid-template-columns: 1fr 1fr;">
        
        <div class="card" style="display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 3rem;">
          <div class="avatar" id="avatarPreview" style="width: 120px; height: 120px; font-size: 3rem; margin-bottom: 1.5rem; background-size: cover; background-position: center;">?</div>
          
          <div style="text-align: center;">
            <input type="file" id="fotoUpload" accept="image/*" style="display: none;" onchange="uploadFoto()">
            <button class="btn btn-primary" onclick="document.getElementById('fotoUpload').click()" id="uploadBtn">
              Alterar Foto (Upload)
            </button>
            <p class="text-muted" style="margin-top: 10px; font-size: 0.85rem;">Formatos aceitos: JPG, PNG.</p>
          </div>
        </div>

        <div class="card">
          <h3 style="margin-bottom: 1.5rem;">Informações Pessoais</h3>
          <form id="perfil-form">
            <div class="input-group">
              <label class="text-muted" style="margin-bottom: 5px; display: block; font-size: 0.9rem;">Nome de Exibição</label>
              <input type="text" id="nomeInput" required>
            </div>
            <div class="input-group" style="opacity: 0.5; pointer-events: none;">
              <label class="text-muted" style="margin-bottom: 5px; display: block; font-size: 0.9rem;">Endereço de E-mail</label>
              <input type="email" id="emailInput" disabled>
            </div>
            
            <div style="margin-top: 1.5rem; padding-top: 1.5rem; border-top: 1px solid var(--border);">
              <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 1rem;">
                <h4 style="color: var(--text);">Segurança</h4>
                <button type="button" onclick="togglePasswordSection()" class="btn-link" style="font-size: 0.85rem; color: var(--primary); background: none; border: none; cursor: pointer;">Alterar Senha</button>
              </div>
              
              <div id="password-section" style="display: none; background: rgba(239, 68, 68, 0.05); padding: 1.5rem; border-radius: 16px; border: 1px solid rgba(239, 68, 68, 0.2); margin-bottom: 1.5rem; animation: slideDown 0.3s ease-out;">
                <div class="input-group">
                  <label style="margin-bottom: 8px; display: block; font-size: 0.85rem; color: #ef4444; font-weight: 500;">Senha Atual de Acesso</label>
                  <input type="password" id="senhaAtual" placeholder="Digite sua senha atual" autocomplete="off" style="background: rgba(0,0,0,0.3); border-color: rgba(239, 68, 68, 0.2);">
                </div>
                
                <div class="input-group">
                  <label style="margin-bottom: 8px; display: block; font-size: 0.85rem; color: #ef4444; font-weight: 500;">Definir Nova Senha</label>
                  <input type="password" id="novaSenha" placeholder="Mínimo 6 caracteres" autocomplete="new-password" style="background: rgba(0,0,0,0.3); border-color: rgba(239, 68, 68, 0.2);">
                </div>
                
                <button type="button" onclick="updatePassword()" class="btn" style="width: 100%; background: #ef4444; color: white; font-weight: 700; margin-top: 0.5rem; box-shadow: 0 4px 15px rgba(239, 68, 68, 0.3);" id="passBtn">Confirmar Alteração Crítica</button>
                <p class="text-muted" style="font-size: 0.7rem; text-align: center; margin-top: 12px;">Isso irá deslogar sua conta de outros dispositivos por segurança.</p>
              </div>
            </div>

            <div style="margin-top: 1.5rem; padding-top: 1.5rem; border-top: 1px solid var(--border);">
              <h4 style="margin-bottom: 1rem; color: var(--text);">Aparência da Plataforma</h4>
              <button type="button" class="btn" style="background: var(--dashboard-bg1); border: 1px solid var(--border); color: var(--text); overflow: hidden; position: relative;" onclick="App.toggleTheme()">
                <span class="icon-sun" style="display: flex; align-items: center; justify-content: center; width: 100%;">
                  <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="5"></circle><line x1="12" y1="1" x2="12" y2="3"></line><line x1="12" y1="21" x2="12" y2="23"></line><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"></line><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"></line><line x1="1" y1="12" x2="3" y2="12"></line><line x1="21" y1="12" x2="23" y2="12"></line><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"></line><line x1="18.36" y1="4.22" x2="19.78" y2="5.64"></line></svg>
                </span>
                <span class="icon-moon" style="display: none; align-items: center; justify-content: center; width: 100%;">
                  <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"></path></svg>
                </span>
              </button>
            </div>
            
            <button type="submit" class="btn btn-success" style="margin-top: 2rem;" id="saveBtn">Salvar Alterações</button>
          </form>
        </div>
      </section>

    </main>
  </div>

  <script src="app.js"></script>
  <script>
    if(!App.getToken()) window.location.href = 'login.html';

    let currentAvatarUrl = '';

    async function loadData() {
      try {
        const user = await App.api('/auth/me');
        document.getElementById('nomeInput').value = user.nome;
        document.getElementById('emailInput').value = user.email;
        currentAvatarUrl = user.avatarUrl || '';
        
        // Carrega no Topo
        document.getElementById('userNameTop').innerText = user.nome;
        const avatarDivTop = document.getElementById('avatarLetter');
        
        const avatarDiv = document.getElementById('avatarPreview');
        if (currentAvatarUrl) {
          avatarDiv.style.backgroundImage = `url(${currentAvatarUrl})`;
          avatarDiv.innerText = '';
          avatarDivTop.style.backgroundImage = `url(${currentAvatarUrl})`;
          avatarDivTop.innerText = '';
        } else {
          avatarDiv.innerText = user.nome.charAt(0).toUpperCase();
          avatarDivTop.innerText = user.nome.charAt(0).toUpperCase();
        }
      } catch (err) {
        if(err.message.includes('Sessão')) App.logout();
      }
    }

    async function uploadFoto() {
      const fileInput = document.getElementById('fotoUpload');
      if (fileInput.files.length === 0) return;

      const btn = document.getElementById('uploadBtn');
      btn.innerText = 'Enviando...';
      btn.disabled = true;

      try {
        const formData = new FormData();
        formData.append('file', fileInput.files[0]);

        const uploadRes = await fetch(`${API_URL}/upload`, {
          method: 'POST',
          headers: { 'Authorization': 'Bearer ' + App.getToken() },
          body: formData
        });
        const uploadData = await uploadRes.json();
        if (!uploadRes.ok) throw new Error(uploadData.error || 'Erro no upload');
        
        currentAvatarUrl = uploadData.url;
        
        const avatarDiv = document.getElementById('avatarPreview');
        avatarDiv.style.backgroundImage = `url(${currentAvatarUrl})`;
        avatarDiv.innerText = '';
        
        App.showToast('Foto enviada! Não esqueça de salvar.');
      } catch (err) {
        App.showToast(err.message, true);
      } finally {
        btn.innerText = 'Alterar Foto (Upload)';
        btn.disabled = false;
      }
    }

    document.getElementById('perfil-form').addEventListener('submit', async (e) => {
      e.preventDefault();
      const btn = document.getElementById('saveBtn');
      btn.innerText = 'Salvando...';
      btn.disabled = true;

      try {
        await App.api('/auth/me', {
          method: 'PUT',
          body: JSON.stringify({
            nome: document.getElementById('nomeInput').value,
            avatarUrl: currentAvatarUrl
          })
        });
        App.showToast('Perfil atualizado com sucesso!');
      } catch (err) {
        App.showToast(err.message, true);
      } finally {
        btn.innerText = 'Salvar Alterações';
        btn.disabled = false;
      }
    });

    function togglePasswordSection() {
      const section = document.getElementById('password-section');
      const isVisible = section.style.display !== 'none';
      
      section.style.display = isVisible ? 'none' : 'block';
      
      // Força os campos a iniciarem vazios para evitar autofill indesejado
      if (!isVisible) {
        document.getElementById('senhaAtual').value = '';
        document.getElementById('novaSenha').value = '';
      }
    }

    async function updatePassword() {
      const btn = document.getElementById('passBtn');
      const senhaAtual = document.getElementById('senhaAtual').value;
      const novaSenha = document.getElementById('novaSenha').value;

      if(!senhaAtual || !novaSenha) return App.showToast('Preencha os dois campos de senha.', true);
      if(novaSenha.length < 6) return App.showToast('A nova senha deve ter no mínimo 6 caracteres.', true);

      btn.innerText = 'Processando...';
      btn.disabled = true;

      try {
        await App.api('/auth/password', {
          method: 'PUT',
          body: JSON.stringify({ senhaAtual, novaSenha })
        });
        App.showToast('Senha atualizada com sucesso!');
        document.getElementById('senhaAtual').value = '';
        document.getElementById('novaSenha').value = '';
        togglePasswordSection();
      } catch (err) {
        App.showToast(err.message, true);
      } finally {
        btn.innerText = 'Confirmar Nova Senha';
        btn.disabled = false;
      }
    }

    loadData();
  </script>
</body>
</html>
