<!DOCTYPE html>
<html lang="pt-BR">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>EnemFlow - Dashboard</title>
  <link rel="stylesheet" href="style.css">
  <style>
    .subject-card {
      background: var(--bg-panel) !important;
      border: 1px solid var(--border) !important;
      border-radius: 20px;
      padding: 2.25rem 2rem;
      cursor: pointer;
      position: relative;
      overflow: hidden;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      min-height: 220px;
      box-shadow: 0 4px 20px rgba(0, 0, 0, 0.2);
      transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1) !important;
    }
    
    .subject-card::before {
      content: '';
      position: absolute;
      top: 0; left: 0; right: 0; height: 4px;
      background: var(--card-gradient, linear-gradient(90deg, var(--primary), var(--secondary)));
      opacity: 0.8;
      transition: opacity 0.3s ease;
    }

    .subject-card:hover {
      transform: translateY(-6px);
      border-color: var(--card-primary, var(--primary)) !important;
      box-shadow: 0 12px 30px rgba(0, 0, 0, 0.4), 0 0 15px rgba(99, 102, 241, 0.15) !important;
    }
    
    .subject-card:hover .subject-title {
      color: #ffffff !important;
    }
    
    .subject-card:hover .subject-arrow {
      transform: translateX(4px);
    }
  </style>
</head>

<body>
  <div class="page-enter"></div>

  <div class="app-container">
    
    <!-- Barra de Topo Mobile (Aparece apenas no celular) -->
    <div class="mobile-top-actions" style="display: none; justify-content: center;">
      <div class="sidebar-logo" style="margin: 0; padding: 0;">
        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="url(#gradMobileDashboard)" stroke-width="2">
          <defs>
            <linearGradient id="gradMobileDashboard" x1="0%" y1="0%" x2="100%" y2="100%">
              <stop offset="0%" style="stop-color:#6366f1;stop-opacity:1" />
              <stop offset="100%" style="stop-color:#ec4899;stop-opacity:1" />
            </linearGradient>
          </defs>
          <polygon points="13 2 3 14 12 14 11 22 21 10 12 10 13 2"></polygon>
        </svg>
      </div>
      <div id="adminMobileBtn" style="position: absolute; left: 20px;"></div> 
    </div>

    <!-- Sidebar -->
    <aside class="sidebar">
      <div class="sidebar-logo">
        <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="url(#grad)" stroke-width="2"
          stroke-linecap="round" stroke-linejoin="round">
          <defs>
            <linearGradient id="grad" x1="0%" y1="0%" x2="100%" y2="100%">
              <stop offset="0%" style="stop-color:#6366f1;stop-opacity:1" />
              <stop offset="100%" style="stop-color:#ec4899;stop-opacity:1" />
            </linearGradient>
          </defs>
          <polygon points="13 2 3 14 12 14 11 22 21 10 12 10 13 2"></polygon>
        </svg>
        <span class="text-gradient" style="font-family: 'Outfit'; font-weight: 800;">EnemFlow</span>
      </div>

      <nav style="flex: 1;">
        <a href="dashboard.html" class="nav-link active">
          <svg viewBox="0 0 24 24">
            <path d="m3 9 9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"></path>
            <polyline points="9 22 9 12 15 12 15 22"></polyline>
          </svg>
          Home
        </a>
        <a href="progresso.html" class="nav-link">
          <svg viewBox="0 0 24 24">
            <path d="M22 12h-4l-3 9L9 3l-3 9H2"></path>
          </svg>
          Progresso
        </a>
        <a href="anotacoes.html" class="nav-link">
          <svg viewBox="0 0 24 24">
            <path d="M12 20h9"></path>
            <path d="M16.5 3.5a2.121 2.121 0 0 1 3 3L7 19l-4 1 1-4L16.5 3.5z"></path>
          </svg>
          Anotações
        </a>
        <a href="perfil.html" class="nav-link">
          <svg viewBox="0 0 24 24"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path><circle cx="12" cy="7" r="4"></circle></svg>
          Meu Perfil
        </a>
      </nav>

      <button onclick="App.logout()" class="btn btn-danger"
        style="margin-top: auto; justify-content: flex-start; padding-left: 16px;">
        <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"></path>
          <polyline points="16 17 21 12 16 7"></polyline>
          <line x1="21" y1="12" x2="9" y2="12"></line>
        </svg>
        Sair da conta
      </button>
    </aside>

    <!-- Main Content -->
    <main class="main-content">

      <header class="topbar">
        <div class="user-profile" style="cursor: pointer;" onclick="window.location.href='perfil.html'">
          <div class="avatar" id="avatarLetter" style="background-size: cover; background-position: center;">?</div>
          <div>
            <h2 id="userName" style="font-size: 1.4rem; line-height: 1.2;">Carregando...</h2>
            <p class="text-muted">Pronto para dominar o conteúdo de hoje?</p>
          </div>
        </div>

        <div class="xp-badge">
          <svg viewBox="0 0 24 24" width="16" height="16" fill="currentColor" stroke="none">
            <polygon points="13 2 3 14 12 14 11 22 21 10 12 10 13 2"></polygon>
          </svg>
          <span id="userXP">0</span> XP Acumulado
        </div>
      </header>

      <section>
        <div style="display: flex; justify-content: space-between; align-items: flex-end; margin-bottom: 1.5rem;">
          <div>
            <h3 style="font-size: 1.5rem; margin-bottom: 4px;">Trilha de Missões</h3>
            <p class="text-muted">Escolha um tópico para entrar em Foco.</p>
          </div>
        </div>

        <div id="content-list" class="grid">
          <!-- Renderizado via JS -->
        </div>
      </section>

    </main>
  </div>

  <script src="app.js"></script>
  <script>
    if (!App.getToken()) window.location.href = 'login.html';

    async function loadProfile() {
      try {
        const user = await App.api('/auth/me');
        document.getElementById('userName').innerText = user.nome;
        
        const avatarDiv = document.getElementById('avatarLetter');
        if (user.avatarUrl) {
          avatarDiv.style.backgroundImage = `url(${user.avatarUrl})`;
          avatarDiv.innerText = '';
        } else {
          avatarDiv.innerText = user.nome.charAt(0).toUpperCase();
        }

        document.getElementById('userXP').innerText = user.xp;

        

      } catch (err) {
        if (err.message.includes('Sessão') || err.message.includes('Token') || err.message.includes('Usuário')) App.logout();
      }
    }

    function getSubjectColors(subjectName) {
      const s = subjectName.toLowerCase();
      if (s.includes('mat')) return { grad: 'linear-gradient(135deg, #1e1b4b 0%, #312e81 100%)', badge: 'rgba(99, 102, 241, 0.2)', text: '#a5b4fc', border: '#4338ca' };
      if (s.includes('port') || s.includes('red') || s.includes('lin')) return { grad: 'linear-gradient(135deg, #4c0519 0%, #881337 100%)', badge: 'rgba(244, 63, 94, 0.2)', text: '#fda4af', border: '#be123c' };
      if (s.includes('fis') || s.includes('quim') || s.includes('cie') || s.includes('bio') || s.includes('natureza')) return { grad: 'linear-gradient(135deg, #022c22 0%, #064e3b 100%)', badge: 'rgba(16, 185, 129, 0.2)', text: '#a7f3d0', border: '#047857' };
      if (s.includes('hist') || s.includes('geog') || s.includes('hum') || s.includes('filo') || s.includes('socio')) return { grad: 'linear-gradient(135deg, #451a03 0%, #78350f 100%)', badge: 'rgba(245, 158, 11, 0.2)', text: '#fde68a', border: '#b45309' };
      // Default
      return { grad: 'linear-gradient(135deg, #09090b 0%, #18181b 100%)', badge: 'rgba(255,255,255,0.06)', text: '#e4e4e7', border: '#27272a' };
    }

    async function loadContents() {
      try {
        const listContainer = document.getElementById('content-list');
        listContainer.innerHTML = '<p class="text-muted">Buscando inteligência no servidor...</p>';

        const contents = await App.api('/contents');

        if (contents.length === 0) {
          listContainer.innerHTML = '<p class="text-muted">Nenhum conteúdo disponível. O Admin ainda não publicou as aulas.</p>';
          return;
        }

        const subjects = {};
        contents.forEach(c => {
          const m = c.materia || 'Geral';
          if (!subjects[m]) subjects[m] = 0;
          subjects[m]++;
        });

        let html = '';
        for (const m in subjects) {
          const count = subjects[m];
          const colors = getSubjectColors(m);
          
          html += `
            <div class="card subject-card" onclick="window.location.href='materia.html?subject=${encodeURIComponent(m)}'" style="--card-gradient: ${colors.grad}; --card-primary: ${colors.border};">
              
              <div>
                <span class="tag" style="background: ${colors.badge}; color: ${colors.text}; border: 1px solid ${colors.border}22; font-size: 0.72rem; font-weight: 800; padding: 5px 12px; border-radius: 8px; text-transform: uppercase; display: inline-block;">
                  ${count} ${count === 1 ? 'Aula' : 'Aulas'}
                </span>
                <h2 class="subject-title" style="font-size: 2.1rem; font-weight: 800; color: ${colors.text}; text-shadow: 0 4px 15px ${colors.border}44; margin-top: 1rem; margin-bottom: 0.5rem; transition: color 0.2s ease; font-family: 'Outfit';">
                  ${m}
                </h2>
                <p style="color: var(--text-muted); font-size: 0.88rem; line-height: 1.5; max-width: 280px; margin: 0; font-family: 'Inter', sans-serif;">
                  Acesse apostilas digitais e assista a vídeo aulas preparatórias focadas.
                </p>
              </div>
              
              <div style="display: flex; align-items: center; gap: 8px; margin-top: 1.5rem; color: ${colors.text}; font-size: 0.88rem; font-weight: 600;">
                <span>Estudar Disciplina</span>
                <svg class="subject-arrow" viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2.5" style="transition: transform 0.2s ease;">
                  <line x1="5" y1="12" x2="19" y2="12"></line>
                  <polyline points="12 5 19 12 12 19"></polyline>
                </svg>
              </div>
            </div>
          `;
        }

        listContainer.innerHTML = html;
        listContainer.classList.add('grid');

      } catch (err) {
        App.showToast('Falha ao sincronizar conteúdos.', true);
      }
    }

    function openStudy(id, titulo, url) {
      localStorage.setItem('currentContentId', id);
      window.location.href = 'study.html';
    }

    loadProfile();
    loadContents();
  </script>
</body>

</html>
