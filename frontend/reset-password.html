<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>EnemFlow - Redefinir Senha</title>
  <link rel="stylesheet" href="style.css">
</head>
<body style="display: flex; align-items: center; justify-content: center; min-height: 100vh;">

  <div class="card" style="width: 100%; max-width: 400px; padding: 2.5rem; text-align: center;">
    <div style="margin-bottom: 2rem;">
        <h2 class="text-gradient" style="font-size: 2rem; margin-bottom: 0.5rem;">Nova Senha</h2>
        <p class="text-muted">Crie uma nova credencial mestra para sua conta.</p>
    </div>

    <form id="reset-form">
      <div class="input-group">
        <input type="password" id="novaSenha" placeholder="Nova Senha (min. 6 caracteres)" required minlength="6">
      </div>
      <div class="input-group">
        <input type="password" id="confirmaSenha" placeholder="Confirme a Nova Senha" required minlength="6">
      </div>

      <button type="submit" class="btn btn-primary" id="submitBtn" style="width: 100%;">
        Redefinir e Acessar
      </button>
    </form>
    
    <div style="margin-top: 1.5rem;">
        <a href="login.html" class="text-muted" style="text-decoration: none; font-size: 0.9rem;">Voltar ao Login</a>
    </div>
  </div>

  <script src="app.js"></script>
  <script>
    const urlParams = new URLSearchParams(window.location.search);
    const token = urlParams.get('token');

    if (!token) {
      App.showToast('Token de recuperação ausente. Solicite um novo link.', true);
      setTimeout(() => window.location.href = 'login.html', 3000);
    }

    document.getElementById('reset-form').addEventListener('submit', async (e) => {
      e.preventDefault();
      const novaSenha = document.getElementById('novaSenha').value;
      const confirmaSenha = document.getElementById('confirmaSenha').value;

      if (novaSenha !== confirmaSenha) {
        return App.showToast('As senhas não coincidem!', true);
      }

      const btn = document.getElementById('submitBtn');
      btn.innerText = 'Processando...';
      btn.disabled = true;

      try {
        const res = await App.api('/auth/reset-password', {
          method: 'POST',
          body: JSON.stringify({ token, novaSenha })
        });
        App.showToast(res.message);
        setTimeout(() => window.location.href = 'login.html', 2000);
      } catch (err) {
        App.showToast(err.message, true);
        btn.innerText = 'Redefinir e Acessar';
        btn.disabled = false;
      }
    });
  </script>
</body>
</html>
