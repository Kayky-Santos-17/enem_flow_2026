<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>EnemFlow - Anotações</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="page-enter"></div>
  
  <div class="app-container">
    
    <!-- Sidebar -->
    <aside class="sidebar">
      <div class="sidebar-logo">
        <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="url(#grad)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <defs>
            <linearGradient id="grad" x1="0%" y1="0%" x2="100%" y2="100%">
              <stop offset="0%" style="stop-color:#6366f1;stop-opacity:1" />
              <stop offset="100%" style="stop-color:#ec4899;stop-opacity:1" />
            </linearGradient>
          </defs>
          <polygon points="13 2 3 14 12 14 11 22 21 10 12 10 13 2"></polygon>
        </svg>
        <span class="text-gradient" style="font-family: 'Outfit'; font-weight: 800;">EnemFlow</span>
      </div>

      <nav style="flex: 1;">
        <a href="dashboard.html" class="nav-link">
          <svg viewBox="0 0 24 24"><path d="m3 9 9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"></path><polyline points="9 22 9 12 15 12 15 22"></polyline></svg>
          Home
        </a>
        <a href="progresso.html" class="nav-link">
          <svg viewBox="0 0 24 24"><path d="M22 12h-4l-3 9L9 3l-3 9H2"></path></svg>
          Progresso
        </a>
        <a href="anotacoes.html" class="nav-link active">
          <svg viewBox="0 0 24 24"><path d="M12 20h9"></path><path d="M16.5 3.5a2.121 2.121 0 0 1 3 3L7 19l-4 1 1-4L16.5 3.5z"></path></svg>
          Anotações
        </a>
      </nav>

      <button onclick="App.logout()" class="btn btn-danger" style="margin-top: auto; justify-content: flex-start; padding-left: 16px;">
        <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"></path><polyline points="16 17 21 12 16 7"></polyline><line x1="21" y1="12" x2="9" y2="12"></line></svg>
        Sair da conta
      </button>
    </aside>

    <!-- Main Content -->
    <main class="main-content">
      
      <header class="topbar">
        <div class="user-profile" style="cursor: pointer;" onclick="window.location.href='perfil.html'">
          <div class="avatar" id="avatarLetter" style="background-size: cover; background-position: center;">?</div>
          <div>
            <h2 id="userName" style="font-size: 1.4rem; line-height: 1.2;">Carregando...</h2>
            <p class="text-muted">Seu caderno inteligente de resumos.</p>
          </div>
        </div>
      </header>

      <section class="grid" style="grid-template-columns: 1fr 2fr;">
        
        <div>
          <div class="card" style="padding: 1.5rem;">
            <h3 style="margin-bottom: 1rem; font-size: 1.2rem;">Nova Anotação</h3>
            <div class="input-group">
              <input type="text" id="note-title" placeholder="Título da anotação..." required>
            </div>
            <div class="input-group">
              <textarea id="note-text" placeholder="Escreva aqui..." rows="6" style="width: 100%; padding: 14px; background: rgba(0,0,0,0.2); border: 1px solid var(--border); border-radius: 12px; color: white; font-family: 'Inter'; resize: vertical;"></textarea>
            </div>
            <button class="btn btn-success" onclick="saveNote()">Salvar Anotação</button>
          </div>
        </div>

        <div>
          <h3 style="margin-bottom: 1rem; font-size: 1.2rem;">Anotações Salvas</h3>
          <div id="notes-list" class="grid" style="grid-template-columns: 1fr 1fr;">
            <!-- Renderizado via JS -->
          </div>
        </div>

      </section>

    </main>
  </div>

  <script src="app.js"></script>
  <script>
    if(!App.getToken()) window.location.href = 'login.html';

    async function loadProfile() {
      try {
        const user = await App.api('/auth/me');
        document.getElementById('userName').innerText = user.nome;
        const avatarDiv = document.getElementById('avatarLetter');
        if (user.avatarUrl) {
          avatarDiv.style.backgroundImage = `url(${user.avatarUrl})`;
          avatarDiv.innerText = '';
        } else {
          avatarDiv.innerText = user.nome.charAt(0).toUpperCase();
        }
      } catch (err) {}
    }

    function loadNotes() {
      const notes = JSON.parse(localStorage.getItem('enemflow_notes')) || [];
      const container = document.getElementById('notes-list');
      
      if(notes.length === 0) {
        container.innerHTML = '<p class="text-muted" style="grid-column: 1 / -1;">Você ainda não criou nenhuma anotação.</p>';
        return;
      }

      container.innerHTML = notes.map((n, i) => `
        <div class="card" style="padding: 1.2rem; position: relative;">
          <h4 style="color: var(--primary); margin-bottom: 8px;">${n.title}</h4>
          <p class="text-muted" style="font-size: 0.9rem; white-space: pre-wrap;">${n.text}</p>
          <button onclick="deleteNote(${i})" class="btn-link" style="position: absolute; top: 10px; right: 10px; color: var(--danger); font-size: 1.2rem;">&times;</button>
        </div>
      `).join('');
    }

    function saveNote() {
      const title = document.getElementById('note-title').value;
      const text = document.getElementById('note-text').value;

      if(!title || !text) return App.showToast('Preencha tÃ­tulo e texto!', true);

      const notes = JSON.parse(localStorage.getItem('enemflow_notes')) || [];
      notes.unshift({ title, text });
      localStorage.setItem('enemflow_notes', JSON.stringify(notes));

      document.getElementById('note-title').value = '';
      document.getElementById('note-text').value = '';
      
      App.showToast('Anotação salva com sucesso!');
      loadNotes();
    }

    function deleteNote(index) {
      const notes = JSON.parse(localStorage.getItem('enemflow_notes')) || [];
      notes.splice(index, 1);
      localStorage.setItem('enemflow_notes', JSON.stringify(notes));
      loadNotes();
    }

    loadProfile();
    loadNotes();
  </script>
</body>
</html>
